name: Build testing APK

# Signed release APK for owner device testing.
# Trigger manually from the Actions tab; download the artifact to your phone.
#
# Requires secrets:
#   GOOGLE_SERVICES_JSON  — Firebase config (mandatory)
#   INDIA_API_TOKEN        — static API bearer token (mandatory)
#   KEYSTORE_BASE64        — base64-encoded .jks keystore (mandatory for signed build)
#   KEYSTORE_PASSWORD      — keystore password
#   KEY_ALIAS              — key alias (e.g. lumin-india)
#   KEY_PASSWORD           — key password

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  apk:
    name: Testing APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform directory
        run: |
          flutter create -t app --org=org.luminapp --platforms=android --project-name=lumin_india .
          rm -f test/widget_test.dart

      - name: Write google-services.json from secret
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Decode keystore and write key.properties
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/lumin-india.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=lumin-india.jks
          EOF
          # Print SHA-1 for reference (useful when adding to Firebase Console)
          keytool -list -v \
            -keystore android/lumin-india.jks \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            2>/dev/null | grep -E 'SHA1:|SHA256:' || true

      - name: Patch Android project
        run: python3 .github/scripts/patch_android.py

      - name: Build signed APK
        run: |
          flutter pub get
          flutter build apk --release \
            --dart-define=INDIA_API_BASE_URL=https://lumintrade.app \
            --dart-define=INDIA_API_TOKEN="${{ secrets.INDIA_API_TOKEN }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumin-india-testing-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
